body:
  text: 名僧傳抄目次名僧傳目録祇洹寺求那跋陀偽秦長安官寺釋道安晉江陵長沙寺釋曇翼晉始寧保山竺法義齊上虞城山寺釋僧行晉江陵長沙寺釋法遇偽秦長安釋道恆三乘漸解實相事無神我事宋長樂寺釋覺世宋莊嚴寺釋曇斌宋莊嚴寺釋曇濟禮法事宋道場寺佛馱跋陀宋定林寺曇摩蜜多宋宗照寺僧伽羅多哆偽魏燉煌釋道韶偽魏長安大寺釋僧印宋中興寺釋慧攬晉永興龍山大寺納衣宋尋陽釋慧通宋欣平龍華寺釋道汪晉尋陽廬山陵雲寺釋慧永晉長安太后寺釋慧精晉山陰顯義寺竺法純宋尋陽廬山竺慧慶宋瓦官寺釋慧果宋江陵釋慧海宋城都香積寺釋道法宋欣平慈氏寺釋僧業齊山陰天柱等釋法慧晉吳通玄寺釋僧表宋枳園寺釋智嚴宋道場寺釋寶雲宋齊昌寺釋法盛宋瓦官寺釋僧供宋龍華寺釋道矯齊安樂寺釋曇副釋法祥附名僧傳説處名僧傳抄目次終名僧傳目録莊嚴寺釋寶唱撰名僧傳第一外國法師一漢雒陽蘭臺寺竺迦攝摩騰一漢雒陽蘭臺寺竺法蘭二漢雒陽支樓柯讖三漢雒陽安世高四吳建初寺康僧會五晉長安青門外寺竺法護六晉建初寺白尸梨蜜七晉豫章山康僧淵八名僧傳第二外國法師二偽秦逍遙園佛陀邪舍一偽秦逍遙園鳩摩羅耆婆二偽秦西河曇無懺三名僧傳第三外國法師三王衛軍寺僧伽提婆一偽秦曇摩難提二偽秦僧伽跋澄三祇洹寺求那跋摩四許岡寺僧伽跋摩五中興寺求那跋陀六名僧傳第四神通弘教外國法師四竺佛圖澄名僧傳第五高行上中國法師一晉倉垣水南寺朱仕行一偽秦長安官寺釋道安二名僧傳第六高行中中國法師第二偽秦飛龍山釋僧光一偽秦飛龍山竺道護二偽趙長安竺道進三偽趙燉煌竺法乘四晉江陵上東寺竺僧輔五偽秦勞陽釋法和六偽秦中山康法朗七晉江陵長沙寺釋曇翼八宋江陵竹林寺釋曇從九偽魏釋玄高十名僧傳第七高行下中國法師第三宋餘杭方顯寺僧詅一宋江陵辛寺曇鑒二偽魏曇弘三宋道場寺僧馥四宋祇洹寺僧苞五宋南林寺法業六宋新安寺法瑤七宋彭城晉山寺僧籥八齊靈根寺玄暢九齊定林上寺僧遠十齊定林上寺僧柔十一齊山陰城傍寺惠基十二名僧傳第八隱道上中國法師四晉長安山寺于法蘭一晉長安城西寺帛法祖二晉剡東仰山寺竺法深三晉剡白山靈鷲寺于法開四晉剡石城山寺支道林五晉於替青山寺竺道曠六晉酒泉山寺帛法作七晉吳虎東山竺道一八晉會稽山寺竺法仰九晉剡東仰山寺竺法友十晉長沙麓山寺釋法崇十一晉剡東仰山寺竺法薀十二晉剡東仰山寺康法式十三晉奉高琨瑞山寺竺僧朗十四晉剡山于道邃十五晉始寧保山竺法義十六名僧傳第九隱道中中國法師五晉尋陽廬山釋惠遠傳名僧傳第十隱道下中國法師六晉故章昆山支曇諦一晉吳虎丘東竺道寶二晉蜀郡龍淵寺惠持三偽秦京兆商洛山道整四偽秦覆舟山道立五晉江夏五層寺法愍六晉奉高太山寺僧敦七晉尋陽廬山東寺曇雍八晉尋陽廬山東寺曇恆九宋尋陽廬山西寺道生十宋會稽若邪山懸雷寺道敬十一宋始興靈化山寺僧宗十二宋鍾山定林下寺僧鏡十三宋鍾山草堂寺僧拔十四齊鍾山藥王寺法整十五齊上虞城山寺僧行十六名僧傳第十一中國法師七晉高邑竺法雅一晉淮陽支孝龍二晉瓦官寺竺僧敷三晉瓦官寺竺法汰四晉江陵上明寺釋曇微五晉江陵長沙寺釋法遇六晉河內釋惠超七晉彭城郡竺道融八晉吳郡臺寺釋道祖九晉蜀郡龍淵寺釋惠嚴十晉江陵長沙寺釋僧衛十一名僧傳第十二中國法師八偽秦長安大寺釋僧一偽秦長安釋僧睿二偽秦長安大寺釋景影三偽秦長安釋僧肇四偽秦長安釋道恆五名僧傳第十三中國法師九宋城都廣平寺釋僧恭一宋瓦官寺釋法和二宋彭城寺釋僧弼三宋東阿釋惠靜四宋烏衣寺釋惠睿五宋東安寺釋惠嚴六宋道場寺釋惠觀七宋祇洹寺釋惠義八宋廣平長樂寺釋道誾九宋尋陽廬山釋曇詵十名僧傳第十四中國法師十宋江陵瑟杷寺惠徹一宋祇洹寺僧睿二宋龍光寺寶林三宋淮南中寺釋曇無成四宋棲玄寺釋惠耀五宋吳虎丘山釋道施六宋中興寺釋惠定七宋天竺寺釋弘化八宋謝寺釋曇無達九宋淮南中寺釋曇因十宋比多寶寺釋靜林十一宋長干寺釋道景十二宋靈味寺釋僧合十三宋莊嚴寺釋僧璩十四宋舟楊釋梵敏十五宋中興寺釋道溫十六宋中興寺釋僧嵩十七宋多寶寺釋道亮十八宋天保寺釋惠整十九宋壽陽東山寺釋僧導二十宋江陵上明寺釋惠莊二十一名僧傳第十五中國法師十一宋廣陵永福寺惠因一宋東莞竺僧度二宋宗熙寺曇瑤三宋會稽天柱山惠靜四宋山陰若邪山道猷五宋治城寺惠琳六宋新安寺道猷七宋東安寺道猛八宋長樂寺覺世九名僧傳第十六中國法師十二宋中興寺智斌一宋靈基寺僧瑾二宋莊嚴寺曇斌三宋何園寺惠高四宋莊嚴寺曇濟五宋治城寺惠通六宋東安寺法智七宋龍光寺法寶八宋謝寺僧度九宋中興寺僧慶十宋靈基寺道愛十一宋天竺寺曇淵十二名僧傳第十七中國法師十三齊新安寺曇度一偽魏僧淵二齊莊嚴寺道惠三齊高座寺僧成四齊瓦官寺惠智五齊天保寺道盛六齊湘宮寺法鮮七齊中興寺僧念八齊中興寺道文九齊草堂寺惠熙十齊多寶寺弘苑十一齊長樂寺僧周十二齊靈基寺智林十三偽魏法度十四齊靈基寺曇識十五齊建元寺惠原十六齊中興寺僧鍾十七齊藥王寺曇遷十八齊中興寺僧表十九齊靈基寺法湲二十齊北多寶寺惠隆二十一齊謝寺惠次二十二齊何薗寺惠隆二十三偽魏智誕二十四齊靈基寺僧修二十五齊謝寺僧最二十六齊南海三藏寺曇通二十七齊莊嚴寺玄趣二十八齊大昌寺僧宗二十九偽魏惠記三十齊中寺法安三十一齊莊嚴寺僧達三十二偽魏道登三十三齊彌陀寺僧顯三十四齊靈根寺法常三十五齊中興寺僧印三十六齊福寺敏達三十七齊莊嚴寺僧寶三十八名僧傳第十八律師宋壽陽石澗寺卑摩羅叉一宋長安大寺曇摩流支二宋江陵辛寺惠猷三宋吳間居寺僧業四宋廣陵長樂寺惠詢五宋汴泗道儼六宋吳間居寺惠光七宋江陵枇杷寺僧隱八宋北法輪寺道遠九宋江陵上明寺成具十宋間心寺道榮十一宋涼洲公府寺法香十二宋涼洲法力十三齊瓦官禪房超度十四齊長干寺法頴十五宋蜀郡靈建寺法琳十六齊定林下寺道嵩十七齊天保寺惠文十八齊間心寺僧祐十九齊安樂寺智稱二十名僧傳第十九外國禪師上晉長安大寺弗若多羅一晉西海跋摩瞿沙二宋西梁洲智山三宋高昌摩騰掘帝四宋道場寺佛馱跋陀五宋江陵辛寺曇摩耶舍六宋定林寺曇摩蜜多七宋建康僧伽達多八宋道林寺疆良耶舍九宋宗熙寺僧伽羅多哆十名僧傳第二十中國禪師下晉中山郡柳泉山釋令詔一晉剡石城山帛僧光二晉始豐赤城山竺曇猷三晉涼洲惠紹四晉彭城鍾寺法相五晉始豐赤城山支曇蘭六晉長安大后寺智通七宋會稽石室靜度八偽魏燉煌道韶九宋南林寺惠始十宋涼洲法成十一宋枳園寺道恭十二宋枳園寺僧咨十三宋酒泉惠全十四宋建康曇泓十五偽魏長安大寺僧印十六宋中興寺惠欖十七宋欣平龍華寺智寅十八宋莊嚴寺僧謙十九宋靈根寺道忠二十宋江陵長沙寺法期二十一宋欣平龍華寺曇智二十二宋靈根寺惠印二十三宋城都安樂寺普恆二十四齊栖靜寺僧審二十五齊招提寺法隱二十六齊武昌頭陀寺法悟二十七齊靈根寺惠暉二十八齊龍華寺曇超二十九齊安固新興寺道果三十名僧傳第二十一神力晉雒陽滿水寺耆域一晉雒陽般鵄山楗陀勒二晉南海羅浮山單道開三晉雒陽常山竺佛調四晉𣕾陽樓至山訶羅竭五晉襄陽羊舛于寺竺法惠六晉永興龍山大寺納衣七晉南海羅浮山沙門八宋雒陽釋曇始九宋延賢寺杯渡十宋梁洲釋智整十一宋高昌釋法朗十二齊江陵長沙寺釋惠遠十三宋尋陽釋惠通十四齊江陵陟𡵟寺釋僧惠十五名僧傳第二十二兼學苦節第一晉尋陽廬山西寺惠永一宋寧蜀江陽寺普明二宋欣平龍華寺道汪三宋道場寺法莊四宋謝寺僧開五宋彭城寺惠琳六宋天保寺僧蘭七齊普弘寺惠溫八齊道林寺僧隆九齊興皇寺惠堅十齊西安寺僧侯十一齊草堂寺法紹十二齊靈曜寺僧全十三齊靈根寺惠豫十四齊奉城寺僧護十五齊長干寺玄暢十六齊新安寺玄運十七齊彭城靜林法遷十八齊建元寺僧嵩十九齊臨沂攝山法度二十齊江陵四層寺惠敞二十一名僧傳第二十三感通苦節第二晉洛陽康法持一晉江左釋僧顯二晉河北帛法橋三晉剡支曇嶷四晉尋陽廬山陵雲寺釋惠永五晉信安釋曇彼六晉長安太后寺釋惠精七晉長安釋惠搜八晉鍾山竺曇蓋九晉尋陽釋僧濟十晉河陰白馬寺釋曇邃十一晉尋陽廬山釋僧融十二晉瓦官寺支法乾十三晉山陰顯義寺竺法純十四宋鹽官若常山石室釋僧秀十五宋建康釋惠簡十六宋南澗寺釋道固十七宋謝寺釋僧弘十八宋尋陽廬山竺惠慶十九宋瓦官寺釋慧果二十名僧傳第二十四遺身苦節三晉羅江霍山僧群一晉河北曇化二宋長安寒山僧周三宋高昌法迎四宋鄴廷尉寺僧富五偽秦法羽六宋臨川招提寺惠紹七宋尋陽廬山僧瑜八宋北竹林寺惠蓋九宋江陵道海十宋城都義興寺僧慶十一宋城都三寶寺僧生十二宋城都武擔寺弘濟十三宋城都香積寺道法十四宋欣平慈氏寺僧業十五齊壟西記城寺法光十六齊交洲仙山寺曇弘十七齊金剛寺法紵十八宋晉壽建元寺弘願十九名僧傳第二十五宋索苦節第四晉上虞徐山曇隆一晉治城寺僧法二晉武當山普施三晉於替法恆四宋東安寺法恭五宋始豐曝布山僧從六宋尋陽廬山陵雲寺惠安七宋剡法華臺法宗八宋天保寺玄敦九宋西涼洲法進傳十宋招提寺惠標十一宋靈曜寺智玄十二宋彭城寺僧䨱十三宋莊嚴寺僧懿十四宋招提寺惠宏十五宋靈基寺道毗十六宋新安寺惠辨十七宋莊嚴寺惠忠十八齊吳間心寺法訓十九齊興福寺僧高二十齊中僧盛二十一齊高座寺惠進二十二齊靈曜寺志道二十三齊龍華寺僧念二十四齊瓦官寺法纖二十五齊定林上寺超辨二十六齊高昌僧遵二十七齊靈基寺法明二十八齊祇洹寺僧志二十九齊祗洹寺惠志三十齊莊嚴寺惠演三十一齊高昌仙窟寺法惠三十二齊正勝寺法願三十三齊山陰天柱寺法惠三十四齊欣平等法定三十五齊欣平龍華寺法衛三十六名僧傳第二十六尋法出經苦節六晉長安竺佛念一晉道場寺法顯二晉東安寺竺法維三晉吳通玄寺僧表四宋枳園寺智嚴五宋道場寺寶雲六宋定林上寺智猛七宋黃龍法勇八宋高昌道普九宋齊昌寺法盛十齊定林上寺法獻十一名僧傳第二十七造經像苦節六晉吳紹靈寺惠護一晉山陰嘉祥寺惠虔二宋瓦官寺僧供三宋吳虎丘山僧詮四宋彭城寺僧鍾五宋瓦官寺僧楊六宋江陵鹿山寺僧亮七宋安樂寺道靜八宋謝寺僧昌九宋龍華寺道矯十齊安樂寺曇副十一名僧傳第二十八造塔寺苦節七晉安樂寺僧受一晉瓦官寺惠力二晉武陵平山惠原三晉建初寺曇爽四晉長干寺惠達五宋白馬寺惠光六宋武陵顯宋寺慈欽七宋始興虎丘山僧律八宋城都費寺法智九宋廣陵靈鷲寺淨開十宋宜昌間居寺曇蘭十一宋延賢寺法意十二宋江陵多寶寺僧運十三宋定林下寺僧鑒十四宋吳縣南寺僧智十五宋江陵長沙寺法翼十六宋長干寺智愛十七宋靈曜寺法意十八宋謝寺僧瞿十九宋番禺祇洹寺法獻二十宋祇洹寺惠敬二十一名僧傳第二十九導師宋祇洹寺道照一宋長干寺曇頴二宋瓦官寺惠璩三宋靈味寺僧意四宋靈味寺曇宋五宋中寺曇光六宋興福寺惠芬七宋祇洹寺惠明八齊齊福寺道儒九齊瓦官寺惠重十齊間心寺僧喜十一齊瓦官寺法覺十二齊齊隆寺法鏡十三名僧傳第三十經師晉建初寺曇藥一晉祇洹寺法平二晉祇洹寺法等三宋白馬寺超明四宋白馬寺明惠五宋白馬寺僧饒六宋安樂寺道惠七宋謝寺智宋八宋新安寺道綜九宋烏衣寺曇遷十宋道場寺法暢十一宋瓦官寺道琰十二齊東安寺曇智十三齊安樂寺僧辨十四齊寧蜀龍淵寺曇馮十五齊中寺僧琮十六齊北多寶寺惠忍十七
