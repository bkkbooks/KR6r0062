body:
  text: 梁寶唱撰名僧傳第三求那跋陀梁言功德賢也中天竺人也少傳五明天文書算醫方呪術風甬盈虗世間術業多所究竟而志力堅明偏習方等以外典雜事弊釋氏乃遁遊師子國依師入道專情學務辭小習大世號之為摩訶乘焉師欲試之命就暗室操取經匣即得華嚴大品師曰大乘於汝乃有重緣奉書父母勸歸正法曰若專外道雖還無益若歸依三寶則長得奉見父感至言遂乖邪崇正頃之功德賢乃奉送資供求向東方因隨舶泛海元嘉十二年春始至廣洲憩雲峯山立寺以山為名時刺史車朗表聞宋文帝遣使迎接其年冬至京師敕住祇洹寺遙入宮臺傳譯意好欣然若故舊帝甚敬異之琅邪顏延之宕才碩學束帶詣門於是京邑道俗車蓋相望彭城譙王義宣置師事焉衆僧共請出經於祇洹寺集義學諸僧初出雜阿含經五十卷又於東安寺出法鼓經二卷出相續解脫經二卷第一義五相略一卷後於舟楊郡譯出勝鬘經一卷又於道場寺出央掘四卷楞伽經四卷衆七百餘人寶雲傳譯惠觀執筆辨章文義妙會先自元嘉二十三年譙王鎮荊洲請與俱行安憩辛寺更立殿房即於寺內出無憂王經一卷八吉祥經一卷過去現在因果四卷無量壽一卷泥洹一卷凡十三部合七十三卷譙王欲請講華嚴等經而跋陀自忖未善漢語愧難積旬即旦夕禮懺請乞冥應遂夢有人白服持劒擎一人首來至其前曰何故憂邪跋陀具以事對答曰不痛壑然便覺心神喜悅旦起言義皆備領漢語於是就講弟子法勇傳譯僧念為都講雖因譯人而玄解往復元嘉將末譙王屢有怪夢跋陀答以京都將有禍亂未及一年而二凶構逆及孝建之初譙王陰謀逆節跋陀顏容憂慘而未及發言譙王問其故跋陀陳爭墾切乃流涕而出曰必無所翼貧道不容扈從義宣問曰法師何故謂弟子舉事不成答曰大王名義宣當以義濟今興兵犯從非義也何以能剋義宣以其物情所信乃逼與俱下過江洲見咸質質問曰法師觀弟子軍容何如答曰猶如聚墨耳梁山之敗火欖轉迫去岸懸遠𠜁無濟理唯一心稱觀世音手捉卭竹杖投身江中水裁至滕以杖刾水水深流駛見一童子尋後而至以手牽之顧謂童子汝小兒何能度我恍忽之間覺行十餘步仍得上岸即脫納衣欲賓童子顧覽不見舉身毛竪方知神力焉時王玄謨督軍梁山孝武勑軍中得摩訶乘善加料理驛信送臺俄而尋得令舸送還都孝武即時引見顧問委典曰企望日久今始相遇跋陀對曰既染覺戾分為灰粉今得接見重荷生造勑問置誰為賊答曰出家之人不豫戎事然張暢宗靈秀等並是驅逼貧道所明但不圖宿緣乃逢此事孝武曰無所懼也是日敕住後堂供施衣物給以人乘初跋陀在荊洲十載每與譙王書疏無不記録及軍敗簡檢無片言及軍事者孝武明其託謹益加禮遇後因間談聊戲問曰念丞相不答曰受供十年何可忘德今從陛下乞願為丞相三年燒香帝悽然動容義而許焉及中興寺成敕令移住令開三間房後於東府宴會王公畢集勑見跋陀時未及淨髮白首皓然孝武遙望顧語尚書謝莊曰摩訶乘聰明機解但老期已至朕試問之必悟人意跋陀上階因迎謂之摩訶乘不負遠來之意但有一在即應聲答曰貧道遠歸帝京垂四十年天恩隆遇銜塊罔極但七十老病唯一死在帝嘉其機辨勑近御座舉朝屢目焉後於秣陵界鳳凰樓西起寺每至夜半輒有推戶而喚視不見人衆屢厭夢跋陀燒香呪曰汝宿緣居此我今起寺行道禮懺常為汝等居住者為護寺善神若不能居隨所安既而道俗十餘人同夕夢見鬼神千數皆荷擔移去寺衆遂安大明七年天下亢旱祈禱山川纍日無驗孝武請令祈雨必使有感如其無效不須相見跋陀答曰仰憑三寶陛下天威翼必降澤如其不獲不復重見即往北湖釣臺燒香祈請不復飲食默而誦經密加祕呪明日晡時西北雲起如車蓋日在桑榆風震雲合即日降雨明旦公卿入賀勑見慰勞嚫施相續陀自幼以來蔬食終身常執持香爐未嘗輟手每食竟輒分食飛鳥集手取食至明帝之世禮供彌盛到泰始四年正月覺體不平便豫與明帝公卿告辭臨終之日延佇而望雲見天華聖像禺中遂卒春秋七十五明帝深加痛惜慰賻甚厚公卿會葬榮衆備焉又續有求那毗地中天竺人聰瞻有記誦經十餘萬言兼解陰陽道術以齊建元中來至住毗舍離寺永明十年譯出十二因緣及頎須達長者經造正觀寺云云名僧傳第五道安本姓衛諸偽秦書並云常山扶柳人也孩稚而家嬰世禍外兄孔氏鞠養之年七歲便解者音讀書五經文義稍已通達迄于志學邪好佛道年十八乃出家性甚聰敏又別立禪房以栖靜勝果竹成列華藥布滿名曰檀溪寺符堅遣使送外國金薄倚像高七尺一軀金坐像一軀結珠彌勒像金縷繡像織成像各一張每講席一建振發風采綱領玄宗開張慧目理思懷道之士皆負書而至時年五十二矣嘗與弟子法遇等以人於彌勒像前立誓願同生兜率偽建元二十一年正月二十七日忽有異僧來求寄憩形色蕭猥服章垢悴以房舍迮狹安置講堂中中宵有起者見講堂不開而於窗間躍出維那白安安呼共語問何事來此希告以實答曰不敢相欺為法師來耳安曰我罪根深淺詎可遇度耶答曰法師罪甚不多易為功德安曰何方自勵可得免度曰故應浴僧浴僧未若浴羅漢功德至重也安曰浴僧力所能辦羅漢何由可致曰但榮其具能相為致之安曰既已降屈相能微見神力開悟衆心此僧即舉手仰撥天西北端重霄既褰見天宮伎樂闔寺道俗無不必覩久乃撝之泯然還合復還講堂因入澡灌中倏爾在外於是辭別而去安乃大勞浴僧浴僧事訖更多煮香陽淨諸浴室果致羅漢數十人化作寺中小兒室前共戲俄而失去聞有浴聲陽物盡用安先與隱士王嘉同在城內以其年二月八日中食畢嘉往候安安曰世事如此行將及人相與去乎嘉曰知所言並前去吾有小責未了不得俱嘉別安初無疾欲然而化春秋七十二葬五級寺中安嘗與嘉及弟子法遇等於彌勒佛前共立誓願願生兜率及姚萇之得長安也嘉故在城門階戶席皆璩舊物巖見愴然而悲縱恨其獨與璩狎并愱其風望恐為人所輔惡而害之泰元十六年造彌勒像今在玄集寺中桓玄為之頌名僧傳第六曇翼本姓姚生羌土中年十六師事道安善辭大乘彌精三藏才識明俊雖不逮安而節行清苦門人莫競晉長沙大守荊洲勝舍欽安風德欲遠相迎請捨宅為寺告安求一僧為寺主安顧謂翼曰荊楚士庶始欲歸宗成其美者非爾誰歟爾其行也翼貞錫南佂至即締構一年功畢名長沙寺後遊蓋部刺史毛璩一遇相重便餉米千斛為設中食飯內得一粒穀即擇取先噉璩歎曰此沙門豈棄人供養者邪遂厚加贈遺尋歸荊洲及丘賊入境抄掠漢南江陵闔境避難上明翼又於上明造東寺後還長沙寺復加開祐造大塔并丈六金像未有舍利祈請纍年忽爾而得即集僧尼五百人燒香讚唱請一鉢水以泛舍利舍利右旋五色光耀清徹滿室因往巳陵君山伐木山海經謂濶廷山者也上有幽穴潛通吳之苞山山既神異行者憚之上人説桓玄聞山有白雉兔乃往求之迷路纍日望船甚近而不得至翼至見白蛇數十斷道翼為説法蛇乃避路夜得夢云林木是所惜既營佛塔輒給但莫命部曲非法取也人力皆是借倩遂有所竊至江陵翼杖巳上秗木未取為軍人御奪改先小塔更立大塔又鑄丈六金像先契二匠便設大會願無鯁妨四輩聞知皆樂隨喜所獲銅鴅過足周用因以所餘更造靈儀舉香七尺翼德被䧅服學徒歸湊每歎寺足衆僧形像尚少嘗聞阿育王多造佛像隨緣流布而獨不至此豈非精誠未詣邪於是彌致懇惻永和十九年二月八日夜忽有像現城北身光照夜明若晨曦闔洲驚騷遠近雲集時白馬寺遣迎百人展力折不能動翼曰此必阿育王像當往長沙寺非強力所能移僉曰請效甚驗翼乃稽首致敬命弟子擎捧裁有五人飄然輕舉四衆推伏請問其故翼笑曰昔有誠願推理謂爾後耳罽賓禪師僧伽難陀從蜀下入寺禮拜云是外國像尋覔銘題佛光果有胡書讀曰阿育王造也年八十二義照中卒云云名僧傳第八竺法義沙門曇宗寺記云惠義不知何許人年九歲遇竺法深法義問曰仁利是君子所行孔丘何故罕言深答曰緣物鮮能行故希言之耳年十三伏膺道門修治戒行標秀之稱與日而升好大乘學尤精法華住瓦官寺王導孔敷並通風契後居始寧之保山徒衆四十餘人皆是高勝道士領會玄微四時不替咸安二年遇篤病針石不差唯專念觀世音久忽夢一沙門出其腸胃去其垢疾清水洗濯還內腸中既窹豁然頓愈晉孝武即位以其名德延出京華常所師咨供給甚厚春秋七十四太元五年卒帝以錢十萬買新亭岡為墓起塔三層時有釋普隨釋惠鑒升卒中居于臨海並有德素云云名僧傳第十和上諱僧行本姓支會稽山陰人年十三出家為基法師弟子住城傍寺每曰神仙之道終有遷墜玄儒之教不能出俗陶瑩心神開發慧悟莫先乎釋氏乃披經問道威儀弘備常惜寸陰和上同學僧悝擅名東夏與和上影響惠基共弘至教悝山陰人體度弘泰風味宕遠基每曰能光益風化唯行悝而已和上以人間喧動乃移住法華寺自非法事足不下山永明中上虞縣城山寺是蔡興宗所立年歲稍久風範雕喪既闕總領請和上鎮正乃拂衣就之於是闡揚法教開示誘施齊齊烏衆等化之常悅念西方要期安養春秋五十九永明十一年卒又有同學惠通弟子僧誕云云名僧傳第十一法遇別傳云曇遇又別記云道遇也不知何處人也少而慷慨養索自居鄰豪妻之以女郡守徵以為吏皆不從專慕大法投釋道安為師既得沐浴玄化咨諏昧理執橾精懇禁行無𮓪鍾摩頂之愛留起豫之賞於是下帷就業博究深經義陽太守陳笛阮保聞風欽悅修書通好信使往還果有嚫遺晉太元二年寺荷本圍襄陽與曇微曇翼遠惠等下集江陵長沙等法輪移軔學徒雲湊聽受之衆常四百人有一僧於寺飲酒癡夕燒香遇罰而不遣安聞之以竹筒封一荊子手題寄遇遇開封見杖即曰此由飲酒僧也我訓衆不勤遠貽憂賜令維那繫磬聚衆以杖筒量香橙上行香畢出衆前向筒致化化竟伏地命維那行杖三下內杖筒中起又作垂淚嗚咽時境內道俗莫不歎息既而與惠遠書曰吾不能率衆和上隔在異域猶遠垂憂吾罪深矣年六十一卒於江陵云云名僧傳第十二道恆者藍田人年八九歲與群小兒聚沙為佛塔隱士張忠見之曰此兒有日龍二理仕官則位至公輔為道則振隆大法恨吾老矣不得見之恆少而偏孤事後母以孝聞家道清貧固窮守慎手學書讀賣以供養母終服與同學道標俱有名譽及什公入境並參詳譯姚興甚相賞遇謂有經國之才有敕奪恆標法服詔曰卿等體間樂道服膺法門曒然之橾誠在可嘉但朕君臨四海治急須才方欲招肥遁於山林撫陸涗於屠肆況卿等周旋諳舊朕所言盡各抱幹時之能而潛獨善之地此豈朕求賢之至情卿等篤化之深趣昔人云國有驥而不乘方遑遑而更索此之謂也云云名僧傳第十三論曰問三乘漸解實相曰經云三乘同悟實相而得道為實相理有三耶以悟三而果三耶實相唯空而已何應有三若實相理一以悟一而果三者悟一則不應成三答曰實相乃無一可得而有三緣行者悟空有淺深因行者而有三問曰若實相無一可得悟之則理盡不悟則面墻何應有淺深之異因行者而有三答曰若行人悟實相無相者要先識其相然後悟其無相以何為識相如彼生死之相因十二緣唯如來洞見因緣之始終悟生死決定相畢竟不可得如是識相非相故謂之悟實相之上者菩薩觀生死十二因緣唯見其終而不識其始雖悟相非相而不識因緣之始故謂之悟實相之中者二乘之徒唯總觀生死之法是因緣而有雖悟相非相不著於生死而識因緣之始終故謂之悟實相理實無二因於行者照有明暗觀彼諸因緣有盡與不盡故於實相而有三乘之別問曰菩薩之與二乘既不窮因緣之始終何得稱悟實相而得道答曰菩薩之與二乘雖不洞見因緣之始終而解生死是因緣而有知生死定相不可得故能不染著於生死超三界而得道云云又問無神我曰經云外道妄見我名之為邪倒今明佛性即我名之為正見外道所以為邪佛性以何為正答曰外道妄見神我無常以為常非耶而何佛法以第一義空為佛性以佛為真我常住而不變非正而何問曰何故謂佛性為我答曰所以謂佛性為我者一切衆生皆有成佛之真性常存之性唯自己之所寶故謂之為我問曰若外道妄見神我以為邪倒者未知衆生為有神耶為無神耶無神者恐空修梵行修善造惡誰受報應答曰衆生雖無常住之神而有善惡之心善惡之心為萬行之主天堂地獄以心為本因果相續由斯以生故常而不存滅而不絶所謂中道者也問曰無常之神雖有善惡之心善惡之心念念不住造善惡之心既當境自滅未來之心非造善惡之主云何使未來之心橫受過去之報有似甲為乙受禍冥司幽罰何其熙哉答曰難云未來之心不造過去善惡之業何得橫受過去善惡之報三後來難可謂發明奇唱夫報應之道不可思議十住菩薩如能髣佛豈凡夫末學所可厝壞且依文句忌言之也經云五道受生以心為本無常心者念念常遷我有古今之異前心不待後心而後心因前而有生死以之無窮果報以之不絶經云劫初穀種能生未來無窮之穀神無不滅心無不因推穀足以知人知人足悟無神是以經云一切諸法本因緣空無主無主之義豈非無神之明證哉名僧傳第十五覺世京兆人也年十二出家篤信行無嗜欲觀世榮利若浮雲烏學善泥洹大品立二諦義以不空假名為宗論議清辨與惠𪬈齊名其高談玄勝以理會心商略過之少遊彭城後來京甸憩長樂寺太始中多通方等經世手不執卷而思徹微眇磐疑石難莫不氷釋精進勇猛三業俱勤弟子僧瑤遇酒小過戒之曰縱情殆惰醉酒飽食此皆罰性之斧也婆寒不為況復息心若能依律懇懺特恕一反若其不爾便宜遠去於是門徒肅然莫不戰栗四輩崇仰遠人慕義春秋五十九云云名僧傳第十六曇斌本姓蘇南陽人也王巾云京兆人也年十餘出家事沙門道禕為弟子患腳疾不敢下都元嘉二年乃往江陵憩於辛寺餐聽經論兼修禪律每苦潭思情未能達後於四層寺中食竟登般若臺讀經倦臥夢見一人白銀色相好分明似是彌勒舉手摩其頂曰善男子汝所疑義數論經書備已解釋遊方自見及窹歡喜因下京都值僧業律師在吳講十誦即往就聽事竟還都從靜林法師於多寶寺誦決所疑琅耶延之於講座相遇謂多寶寺主寶譽曰此傖道人當為往器後就吳興小山法瑤聽泥洹勝又從南林法業受花嚴雜心食不求飽勤不告勞乘月讀經不赴齋會法業問曰齋會嚫施足以市油何故不赴答曰形動神疲則慮不得專不得專則雖學無功曇濟河東人也十三出家為導法師弟子住壽陽八公山東寺少有器度汪汪然儀望端肅機悟通舉讀成實論涅槃以夜繼日未常安寢高談遠論以此自娛善言謔巧應對及自當師匠虗心待物動止云為莫非體度綱維正法開示未聞年始登立譽流四海天子聞風請出都邑以宋大明二年過江住中興寺法輪移甘露灑澤四方義學異軌同到理愜物心道俗嗟仰著七宗論第一本無立宗曰如來興世以本無佛教故方等深經皆備明五陰本無本無之論由來尚矣何者夫冥造之前廓然而已至於元氣陶化則群像稟形形雖資化權化之本則出於自然自然自爾豈有造之者哉由此而言無在元化之先空為衆形之始故稱本無非謂虗豁之中能生萬有也夫人之所滯滯在未有苟宅心本無則斯纍豁矣夫崇本可以息末者蓋此之謂也云云名僧傳第十八夫禮法者外典之篤教戒律者內聖之至範杜利欲之萠絶邪狂之路使三障五蓋同歸道場流遁輕薄咸濟仁壽豈非慈悲博大神化無方者乎自正覺善逝迦葉撰律為八十誦誦者謂常應誦持也而微言稍遠大義相乖遂波握掌藏乃抄為十誦婆粗富羅抄為僧祇又彌沙塞抄為五分曇摩毱多抄為四分與迦葉維所抄合為五部是以長者夢疊已表當分之相亦猶春秋分為五詩分為四之類也沙門法顯以義熙二年從外國還得僧祇彌沙塞律二部止獲胡文未得宣譯義熙九年有弗若多羅至長安與童壽共出十誦律到十二年佛陀邪舍與佛共出四分律其年佛馱跋陀又出僧祇律宋景平元年沙門佛馱什與智勝共出五分律餘迦葉維一部未傳中國自茲迄今法流稍廣四部律律學處處成群諒足導揚前縱嗣徽後代其聲業尤著者並為之傳云云名僧傳第十九佛馱跋陀或云浮頭婆馱梁言覺賢北天竺人也九歲失父母為外家所養年十七出家師令誦經五人同業四人一月敵其一日博覽經律精力過人篤好禪思遇境斯得雅遊九次妙入八解同學僧伽達多心相賞遇同遊賓達多閇室安禪先自念言曰無得覺我者也有頃忽見覺賢對倚彈指達多問曰何從得入答曰向往兜率見子意云無得覺我故相觀耳達多方悟非凡夫人焉苦從謂問乃云得阿那含也曇摩密多梁言法友少稟道化喰味玄祕為三寶之勇卒法城之巨塹諷誦經藏堅持律部偏好禪那兼修定品心安虗靜思達玄微志願遊方弘通禪悅於是泛泊來東以宋永初三年始至江陵住長沙寺旬日之中得一舍利形質雖小光色異常以鉢水泛之遙淥右轉乍浮乍沈光炳煥衆皆驚此神奇嗟歎盈路元嘉初來集京師住祇洹寺譯普賢觀經一分虗空藏觀一分至十年移憩定林業遠囂動專務清寂更華寺後別禪堂師友十餘並雅精業晝夜不休供施雲集以十八年更譯禪祕要三分五門禪經一分春秋八十元嘉十九年六月卒于寺云云僧伽羅多哆梁言僧濟西域人也少失二親又無兄弟師心伉節捨俗襲道夷放小欲虗心慕遠不尚榮華唯以得意為貴僧伽達多見而奇之語經律通禪教人息不息篤學無倦安思三空寂觀五淨延促由心遊戲適我宋永平二年自外國達于帝京棲宅丘林養索川嶽以元嘉十年卜居鍾山之陽剪開榛蕪造立精舍聳剎陵雲高堂架日鑿澗延流傍巖列樹當時之威德故號曰宋熙禪學之衆三十餘人四輩供施相繼不絶濟不畜私財有必入衆禪席常溫法言不輟春秋五十有九元嘉二十七年卒云云名僧傳第二十道韶本姓凡燉煌人也少出家勤道業讀誦大乘披覽戒律備學諸禪頭陀為事業披服弊衣或冢間而坐年過知命操節愈明每至獨處山林單行獸窟遍入諸門歷觀生死嘗夜坐樹下忽雷電霹礰折樹甫枝猛虎群號轉石奔落韶端然不動禪默無異明村人獻供問路泥深淺村人云不雨久方悟鬼神所為焉其日中晡又見索甲彌山舟旗竟野俄而有人來問韶曰沙門何故奪僕所住韶答曰本來相就欲以道變俗謂君是善神共求勝果不虞見怪神有恧焉韶剛正質直少長一槩獨處山間三十餘載時遇惡魔多類此也後於房中坐禪舉身皆冷唯心下微溫眷屬皆悲謂已遷滅經四日乃起問其故自説見閻羅王投其手覺身便冷謂韶曰君今來此當案行地獄指示罪人此皆不信正法造三惡業君命尚延可教化人間韶曰世間有佛經善教猶不遵修況我常人言豈生信閻羅王曰當為君現證令人信也因投右臂牽使長八寸而左手如故及起右臂果長於是精勤有倍恆日勸導道俗講説經戒每中食輒得舍利諸有起塔者皆給與之自爾以後氣力康勝復得十年年至六十餘卒竹林寺釋智紹昔至抱罕親見臂有短長云云僧印姓樊氏金城榆中人釋玄高弟子性腹清純意懷篤至與之久處者未當見慢忤之色下接庸隸必出矝愛之言振恤貧餧有求無逆心道聰利修大乘觀所得境界為禪學之宗省削身口具持淨律嘗在江陵教一比丘受禪頗有所得印語之曰上坐所學應得異境若得便能隨願往生修之不已果值異應即以告印印戒之曰此法乃將來美事然脫不幸大命應終此僧欣然曰由來願生西方得應之後或有勸往兜率者此僧嗟疑良久至三更方決云定向兜率言意就臥同學起看命已逝矣印晝夜誦經禮懺無廢後還長安大寺年六十餘卒惠欖本姓成酒泉人也道行峻梁德聲遠振與玄高俱以寂觀見崇於西土遂遠遊外國供養羅漢禮敬佛鉢習禪於賓達摩達以元嘉四年於樹上得菩薩戒本人定見彌勒云是我與汝漢地道士多發大心欲使大德宣流達摩問言何處受之答曰當於尼揵訶羅國影邊受之此國去賓五千餘里詣彼受之還授惠欖謂欖曰汝宜還東國多有利益來至于置沙洲皆集大衆從欖師受舉國禪思思法忘餐蜀聞禪學莫不師焉云云名僧傳第二十一納衣本姓史名宋不如何許人也多服納衣或時麻衣而寒暑不易故世以服為之號故曰納衣或曰麻衣身首瘡癢不甚洗浴晉義凞中常在廣陵白土謳唱引葃以自欣暢得直隨以布施晝遊夜伏莫知其棲息之處運力終日食不加口靡有知其之所將餌八方殊聲莫不必能時高檀祗為江都令聞而怪之使史攝來應對機稽古博達辨説玄儒賦詩一首曰有欲苦不足無欲亦無憂未若清虗童帶索披玄喪浮遊一世間泛苦不繫舟檀遺布二十返而遣之出城便以乞路人海行里外蕭然都盡不以姓名鄉居語人時世莫有知者後人海行於孤洲上遇一沙門求寄書與史宗云其在白披著納衣道人是也仍量書船中同侶欲取看之而書著船不肯脫及至白土歘然風起飛書就宗宗接而將去人益異之競來敬事拂衣南遊憩于永興縣龍山大寺常過魚梁魚人將獲行有屠膾納衣意甚憫然乃入上流浴群魚散走其潛樣物類皆如此為人清達不悅榮華性用深點雅懷利益善談玄儒洞真實相會稽謝劭魏邁之等皆篤論淵博並從其師受後同止沙門夜聞有與宗共語者頗説蓬來山事曉便不見莫知所適尋陽陶淵明記白土遇三異法師此其一也云云惠通不知所從來多見在尋陽常自稱鄭散騎江陵人邊僧歸商行至壽陽將還江陵通欲寄物於其擔上僧歸不肯受通強之僧歸為受亦不覺重行數里別去謂僧歸曰我有婦在荊州三層寺作尼名惠緒汝至彼可為相聞道我尋往也言畢忽然不見僧歸至荊州具為惠緒言之結尼禪行道德人也既無此兄不解所以後至壽陽尋之不知處通後來荊州到惠緒房緒已死矣訊問委悉寺中知必通也由留荊洲與人行見丘墓皆識名字氏族四月八日於上明東寺齊隨衆僧行道於衆指示人云某人經作劫如是者數人群盜一時走去於江津路值一人以馬杖鞭通通曰汝忿歸看汝家何如此人至家火已燒其宅矣齊永元初就任漾求酒曰宜應遠行永不復相見為謝諸知識並宜精進慎幼退轉飲酒畢至市東墻臥地既視死矣數十日忽復於市見之市人遂視久久乃沒也云云名僧傳第二十二道汪本姓潘長樂人也世規家訓以廉約為風姿禪高秀長七尺七寸幼有不恆之識宗族固已異之少孤隨叔在京師年十三投廬山遠公出家研味禪律停山十餘載新出諸經靡不精綜大涅槃經後傳江左復還京師計論大義費遊文子雅相知愛命子姪咸師之茹蔬餐素五十餘年博綜經律窮覽數論兼涉外典識瞻開誘才強計辨自龍花祇洹天竺武擔相思長磧諸寺繕基啓剎莫不仰止高軌修禪習誦日夜無綴岫蜀佛法由茲大盛益土有流寓之民數千餘家淫祀倒見不識正道自汪至後敬挹清塵宗崇釋氏者殆將本半寧蜀郡常元祖少事父母以孝門深信大法元嘉二十四年卒與其友人夢云我從任法師受菩薩戒今得生兜率天為善利天子因卿語兒輩勿復祭奠刺史吳郡陸簡子天相禮遇云云名僧傳第二十三惠永河內人也出家為竺曇現弟子現篤志直方少有清節長慕肥遁山棲養志以晉太和中於尋陽廬山北嶺下創立寺廟永以北嶺下尚多喧動移於南嶺之上築葺房宇搆起堂殿與煙霞交接名曰淩雲精舍於是棄絶人事隱居幽嶽弊衣菜食禪誦為務時有往者轉聞香氣芬馨流於各內永室中堂有一虎若有畏者驅令上山客去便還甚能馴伏由是道俗景仰焉永嘗獨下山薄脫而歸至烏橋烏橋營主飲酒大醉乘馬當道終不相過日轉逼暮求請不從振錫向馬馬驚反擲營主落地頓仆不能即起馬僻易入草明旦營主入山懺謝謂永使神力永曰貧道體君飲酒初不相怪以常扣錫遂至於斯苦審有此改當是戒神見護耳永性謙恭精苦雖遇疾病而長齊不廢春秋八十三晉泰元五年卒云云惠精又名曇戒本姓卓南陽人晉外兵郎㯤陽令潛之弟也幼而家貧無衣著不得從師友負薪炙火披玩六籍後聞于法道講放光經借衣聽焉告其兄曰始悟儒淺近道教虗曠不能復馳騁方內政欲自放人外耳潛曰誠復人各有心何能獨善其志年十九投釋道安安津為同學甚相知敬遊方請業數四年中忽請安曰世間之苦難可大堪百年俄頃復不待人雖苦之速德行為先精學足以導心今就行道去安曰兼之為勝如不能兼各從其志吾助爾喜誦經五十萬言禮佛為業時禪法未傳依經獨坐晉臨川王雅相禮待資給四事後與安同憩長安太后寺安平後隆安中疾病口誦彌勒未嘗懈息弟子智生侍疾問曰何不願生西方而專呼彌勒答曰吾等道安八人先發誓願願生兜率面見彌勒道願悉以先見唯吾尚存欲遂本願語畢即有光照于身容顏更悅俄而遷化春秋七十葬于道安墓右云云竺法純者未詳何處人也住會稽山陰顯義寺精進苦行遊心虗寂衆甚敬焉請為寺主晉元興中為寺治墻至蘭上買故屋材向暮與榜船人并屋主嫗人入湖須臾風起雲氣四塞自念與女子同殞實寄恥辱飄霰驟疾驚浪飛奔船小水入歸告觀世音并經誦俄而湖中有空船橫來迅疾如飛直至船側誦念彌篤有頃至純別加尋訪船遂主無其舟誠所感如此云云竺惠慶廣陵人也清心高邈識慮虗遠不修世儀專篤戒行溫仁貞素雅有風德柔蔬時食少長一槩涉學經律泛研禪誦誦法華十地維摩思益雖不南面稱法師而理懷簡表晉義熙中遊步長安備浪道藝宋元喜時復入廬山求諸德勝時荊楊大水襄淩浩汗慶始達小雷景風總至同侶強力先皆入浦慶船遲重後來未及楊侯鼓怒聳浪浮天慶生平計盡願望唯佛於是誦念觀世音心無異向岸上之人望見其船匝風截浪狀若人牽俄頃之間安全到岸於是散落嚻磨澄心淨域遊處之地莫不弘道三歸五戒弟子貴賤數萬人舉言發響如風靡草盛造經書頻營法集春秋六十有二元喜二十九年卒云云惠果者豫洲人清規索履爰自童𣩘奉親孝事師敬家貧衣食不給元喜四年負笈南遊至京師住瓦官禪房簟食屢空不噉魚肉燒香禮懺尤勤諷誦十地法華三乘方等靡不通覽清聲秀譽與僧據齊名果嘗於清前忽見一人身著衣帢𣫍板致敬果問曰汝是何人答曰昔為此寺沙門今報為噉糞之鬼果曰昔何所名今那著帢答曰名不足道臨出寺遇事還俗果曰為何罪過而作此鬼答曰昔作直月多請飯食以醬酢乞人法師道德幽顯同敬請作功德令離此身果曰當為禮誦都有物不答曰昔有三千錢埋東房前大柿樹下去時不得取願取為功德也言訖不見果告衆掘得三千為造法華經一部餘物設會會後一月餘日夢見此鬼自云當得更生故未能稱大差於此也果仁愛遠被為世津梁皆類此也春秋七十六泰始六年卒云云名僧傳第二十四道海江陵人也厲行勤修少長一節安貧守約不改其操嘗於長沙寺冬齊將訖時諸僧共作無量壽齊海素空磬無以從衆乃發憤增厲然二指以供養因遂頓問殆將仆絶時諸師僧云但歸命觀世音菩薩可得痛愈於是鍛心正念俄爾便愈後日暮出塔下經行因便危篤至明日將夕曰今有勝人在空中遙來迎之從公室宅猶尚卑陋將是福業未積因明稱報應誨誘其功言訖安臥然而盡云云道法本姓遭氏燉煌人禪思出於人表苦行照見三塗聞蜀粗懷信向胃岺而遊焉王休真費鏗之請為興樂香積二寺主乞食供齋常減其分以施蟲鳥坐禪習誦晝夜無廢每至夕輒脫衣於彌勤像前養飴蚊虻如是多年後見彌勒放種種光齊中白光直入地獄見諸先緣及一切衆生受苦之又善神呪元徽二年因於禪思卒於繩床云云僧業本姓馮蜀郡城都人索行貞奉持律業蔬食勇猛心形不綴宕渠太守江陽錢生世事外道忽夢入寺禮拜見一白玉珠長四寸懸在空中復有散衣高覆其上又一重珠隨其手中既旦遇見僧業共述所夢業便獎發遂能精進共市地以元徽五年立寺焉謂為慈氏寺以所悟為名業乃移住之厭惡穢形期彼常樂云云名僧傳第二十五法惠本姓李氏高昌人少好射獵酣酒弦歌其婦美艷一國無雙高富子弟爭與私通惠他日出遊為豪富所打友人報語惠自思惟己有大力必當見殺避往龜茲乃願出家貧無法服外國人死衣以好衣送尸陀林辭訣而反惠隨他葬家人去彼剝死人衣遇起尸鬼起相菆臾更為上下凡經七反惠率獲勝剝取衣裳貨得三千以為法服仍得出家修學禪律苦行絶群蔬食善誘心無是非後還高昌住仙窟寺德索既高尼衆依止稟其誠訓唯都郎中寺馮尼每謂惠曰阿闍梨未好可往龜茲國金華寺帳下直月間當得勝法惠信尼語往至龜茲到見直月直月歡喜呼進房內以蒲陶酒一斗五升服令其飲惠大驚愕我清淨久本來覓法翻飲非法之藥苦執不肯直月急推令去惠即退思遂不敢違違便頓飲盡醉問而臥直月鎖房乃更餘行及惠酒醒追自拔惱我忽犯戒悔過自責槌打身體欲自害命於此少時得第三果直月還問曰得和後還高昌大弘經律道俗歸敬頎動鄉邑齊永元年無疾坐亡手屈四指云弟子惠化所述云云名僧傳第二十六僧表本姓高涼洲人也志力勇猛聞弗樓沙國有佛鉢鉢今在賓臺寺恆有五百羅漢供養鉢鉢經騰空至涼洲有十二羅漢隨鉢停六年後還賓僧表恨不及見乃至西踰蔥嶺欲致誠禮并至于賓國值賓路梗于賓王寄表有張志模寫佛鉢與之又問寧復有所願不對曰讚摩伽羅有寶勝像外國相傳云最似真相願得供養王即命工巧營造金薄像金光陜高一丈以真舍利置于頂上僧表接還涼州知涼土將亡欲反淮海經蜀欣平縣沙門道汪求停鉢像供養今在彼龍華寺僧表入矣禮敬石像住二載卒于寺云云智嚴西涼洲人也才幹清秀業行精懇菜蔬布衣博施慈愛又疑兒童時曾受五戒有所犯後受具足恐不得戒積年禪觀不能自決大為憂苦遂更與弟子智羽智達泛海重至天竺以事問羅漢羅漢復不能決乃為入定往兜率問彌勒彌勒答云得戒嚴大歡喜於是步還至賓無疾而卒時年七十八弟子智羽智達還傳此語云云寶雲河北人也志局簡正師友稱之太元十四年入廬山時年十八矣值造波若臺通債少僧貞石築土雲投一石石相擊誤中一犢子死慙恨惆悵彌歷年所隆安元年乃辭入西域誓欲眼都神迹躬行懺悔遂遊于闐及天竺諸國與智嚴法顯發軫是同遊造各異於陀歷國見金薄彌勒成佛像整高八丈雲於像下誠啓懺五十日夜見神光照燭晈然如曙觀者盈路彼諸宿德沙門並云靈輝數見云云法盛本姓李壟西人寓于高昌九歲出家勤精讀誦每曰吾三堅未樹五衆生滅合會有離皆由癡愛若不斷三毒何求勉脫年造十九遇沙門智猛從外國還述諸神迹因有志焉辭二親率師友與二十九人遠詣天竺經歷諸國尋覓遺靈及諸應瑞禮拜供養以申三業憂長國東北見牛頭栴檀彌勒像身高八尋一尋是此國一丈也佛滅度後四百八十年中有羅漢名可利難陀為濟人故舛兜率天寫佛真形印此像也常放光明四衆伎樂四時笑樂遠人皆卒從像悔過願無不剋得初道果歲有十數盛與諸方道俗五百人願求捨身必見彌勒此願可諧香煙右旋須臾衆煙合成一蓋右轉三匝漸漸消盡云云名僧傳第二十七僧供豫洲人也少持高節以戒德知名住瓦官寺後招率同志造丈六金像鑄始畢未出模未知美惡值義熙十二年銅禁甚嚴有犯入死供為官所録在湘府判姧鎖械堅重無復生冀一心念觀世音兼晝夜誦經一月許日夢見其所鑄像來至獄中以手摩供頭問曰汝怖不供啓言恐必死像曰無所憂供觀像相貌見𦚾前方一尺許銅色燋沸羅辟既定至形日參軍應來監殺當駕車而牛不肯入既入便奔車即壞敗遂更剋日乃有勑至彭城若未殺僧供者可原遂獲勉濟還見所鑄像𦚾前果有燋沸供既瑞驗清答日勤以至捨命云云道矯高陸人也性清約蔬食禪誦住龍花寺專當寺任恪居客衆元嘉十六年磬率衣資開誘聞業與建康民朱舛孫共起佛殿三間并諸花幡造夾苧彌勒佛倚像一軀高一丈六尺神儀端儼開發信悟春秋九十三二十六年卒云云曇副本姓鄒鄴陽人也清貞有風望十餘入道憩安樂寺宿植其因産業豐積雖蘊金盈遺不以纍心行慈悲知止足常內懷矝傷以濟物為務為沙門寶志所敬常言此人五法城之侶也每記之云君當生兜率勤慈氏符其本願會其夙心乃捨資財造法花無量壽彌勒四天王遺教乃賢劫千佛名僧尼戒本各一千部作布薩籌十萬枚傳布遐方流化殊域開暢微遠竭財弘教盡思幽深應門到廣戒行精峻唯至唯勤乃通夢想有人語之曰若兜率之業已辨無所復慮也又夢彌勒佛手摩其頂天香幡氣神龍現體一二年中靈應想襲春秋六十餘齊建四年卒武陵都尉舟揚仁益弟之立云云名僧傳第二十八釋法祥精進有志節以元嘉九年立彌勒精舍云云文曆二年五月晦日午時於笠置寺福城院南堂書寫之畢柳宗性自去十三日參籠當山名僧傳三十卷中令抄出彌勒感應之要文之次其外至要之釋聊所記置之也此書世間流布惟希之間發殷勤大願抄彌勒要文之今雖似交餘事只為備後覽也門迹之輩可哀其志矣仰願以此處處要文抄出書寫之功必結生生常隨彌勒值遇之緣矣右筆笠置寺住侶沙門宗性附名僧傳説處第一僧祐撰三藏記薩婆多部事摩騰事法蘭事僧會三七日祈請得舍利感應事舍利威神豈直光明而已劫燒之火不能燔金剛之杵不能壞事第二羅什見中百二論始悟大乘事夢釋迦如來以手摩羅什頂曰汝起欲想即土悔心事羅什三藏譯法華等諸經論三十八部二百九十四卷事漢土三千徒衆從羅什法事羅什臨終衆僧告別曰事羅什燒身之後舌猶存事涅槃後分宋地無緣事第三靈鷲山本名虎市山事滿二十受戒西土此土異説事求那跋陀唯一心稱觀世音投身江中童子度之事求那跋陀祈雨必有感事第四中有蟲食必害人事第五道安造彌勒像事道安與弟子法遇等於彌勒像前立獚願同士兜率事道安令弟子銅佛像頂上有一舍利晃然放光照於室內事道安遇客僧問罪根淺深及西北空晴見兜率宮殿事惠戒生兜率事道安等八人生兜率事法遇生兜率事道安即印手菩薩事第六一鉢水上舍利右旋五色光耀清徹滿室事廬山西林惠永惠遠已後正教陵遲事第七曇鑒誓生安養事觀世音菩薩能救苦厄事虗壞善誘彌老彌勒事第八帛法師誦經日八九千言事于法蘭白山造靈鷲寺事支道琳石城山立栖光精舍事帛法祖著顯宗論見稱當時事竺法義遇篤病唯專念觀世音夢一沙門出其腸洗濯還內腹中頓愈事第九廬山惠遠以道安敬為真吾師事惠遠以錫杖扣地清流涌出搆立堂房遂號龍衆精舍事阿育王所造文殊師利像乘波而至事廬山惠遠於無量壽像前建齊立誓事清信之士一百二十三人集廬山之陰般若臺精舍無量壽像前率事建立精舍唯置一釋迦像事遠常謂大智論文句繁積初學難尋事第十曇諦講法華大品維摩各十五遍事惠持九歲隨兌同為書生俱依釋道安抽簪落髮事惠持辭惠遠之處入蜀之時契以西方為期事廬山西寺竺道生事廬山惠遠習有宗事道生曰稟氣二儀者皆是涅槃正因闡提是舍生何無佛性事二乘智惠總相觀空菩薩智慧別相觀空事因善伏惡得名人天業其實非善是受報也事畜生等有富樂人中果報有貧苦事一闡提者不具信根雖斷善猶有佛性事僧行常惜寸陰和上同學事僧行常悅念西方要期安養事第十一道俗男女向西致敬事龍樹再現馬鳴重出事飲酒僧事惠嚴造彌勒像事第十二僧睿誓生安養行立坐臥常向西面事釋迦掩室於摩竭淨名杜口於毗耶須菩唱無説以顯道釋梵以絶聽而雨花事維摩詰言若彌勒得滅度者一切衆生亦當滅度事第十三是以釋迦玄音始發讚佛智甚深多寶稱善嘆平等大會事唯如來洞見因緣之始終菩薩雖悟其終不識彼始事第十四千載一遇事第十五惠目造釋迦倚像高一丈六尺事惠目願主淨國事醉酒飽食此皆罰性之斧事第十六曇斌夢見彌勒事曇濟以夜繼日未常安寢事釋迦興陶神之化慈氏唱方外之教事第十七曇度無求名譽事僧淵從僧嵩法師受成實論事智林著毗曇雜心義記注十二門論及中論並傳於世事曇度著成實義記八卷傳北土事應以聲聞得度者故現聲聞事法瑗夏於靈根講花嚴經事惠沼永明八年講百論至破魔品忽然從化春秋五十有七事齊彌勒寺惠隆事曇通即從咨稟毗曇雜心事法安著十地義疏沙門傳五卷並傳於世事僧達從瑗公受毗曇華嚴事彌陀寺僧顯事法常從僧義讀阿毗曇事僧印稱法華經二百五十二遍事僧寶祈心安養臨彌陀佛因索香火快起合掌奄忽而卒事第十八青眼律師事惠猷著十誦義記八卷事成具遂臻淵奧毗曇雜心事法琳誦無量壽經及無量壽觀西方諸聖皆集令同學禮懺事僧祐辭妻子出家為道事第十九海跋摩瞿沙事華嚴有東方菩薩住所仙人起山事佛馱跋陀往兜率見慈氏事支法領昔遊于奠得華嚴等經三萬六千偈事曇摩蜜多旬日之中得一舍利形質雖小光色異常事曇摩蜜多譯禪祕要三分五門禪經一分事疆良耶舍晝夜勤習諷誦毗曇事僧伽羅多哆少失二親又無兄弟事第二十僧光光不下山五十三載事邃澗方丈以石為橋橋上有石如壁斷人行路事晉涼洲釋惠紹事智通結誠安養事道韶得舍利起塔事法成吾死相已見故悅事僧咨供給四事誦經彌勒事僧印決云定向兜率事惠欖入定見彌勒事道忠誦大品法華金光明經事惠印洞鑒法華深明十誦事法悟誦法華大小品經事齊靈根寺惠暉事第二十一晉雒陽釋曇始稱為白足和上事文殊與沙門問答事牛頭象頭馬頭師子頭四河事雲山即蔥苓事齊江陵長沙寺釋惠遠二月二十三日諸天相迎事飲酒臥地死事第二十二普明誦法華見普賢乘象事自龍華祇洹天竺事從汪法師受菩薩戒今得生兜率天事惠豫死時三人著朱衣武冠故來相迎事第二十三僧顯無量壽佛為萬劫大師事觀世音能令群生現世得願事飲酒初不相怪事曇戒願生兜率事僧齊稽首無量壽佛事法珍願生安養合掌端坐終事法純念觀世音空船來迎事道固喚觀世音願見出道事僧弘願當生淨土事僧暢誦經為業願生西方事惠慶誦念觀世音望見其船事昔有三千錢埋東房前大柿樹下去時不得取願取為功德也事第二十四宋臨川招提寺釋惠紹事惠紹燒身處三日後生梧桐事通海歸命觀世音菩薩可得痛𡀍事通法見彌勒放種種光齊中白光直人地獄事慈氏寺事感得舍利事法光年三十頓絶五穀但餌杉葉事第二十五法恆於像前得舍利事法進睡見釋迦文佛與諸菩薩任栴檀林中為其授戒事惠標造金像五軀及高座帳事僧高與永昌王共修復古塔事惠進願捨此身令生淨國事出家人不得妄語非畏威也事超辨加勤禮懺法華彌陀事法明誦法華無量壽事惠寅辛酒不嘗無所嗜好事法惠飲酒悔過濁第三果事法定誦法華藥王觀普賢觀事第二十六法顯南天王寺得僧祇律薩婆多律抄雜阿毗曇心事法顯念觀世音事造金薄像以真舍利置于頂上事智嚴入定往兜率問答彌勒事寶雲見金薄彌勒成佛像事寶雲遊外國出觀世音授記經事波斯匿王造栴檀像事涅槃後分宋地無緣事牛頭栴檀彌勒像升兜率天寫佛真形事通俗五百人願求捨身必見彌勒事第二十七僧護造釋迦丈六金像事僧供造丈六金像事僧供一心念觀世音事僧詮寫彌陀經數千部事僧詮祈誠西方願生安養事僧供造金無量壽像事僧亮造丈六金像事道靜造無量壽金像高五尺事僧昌造佛像十五軀皆高一丈八尺事道矯造夾苧彌勒佛像事曇副當生兜率事曇副夢彌勒佛手摩其頂天香播氣事第二十八僧受立彌勒精舍事阿育所起塔定有舍利事法意向西方作禮事法意見觀世音事僧智禪房有丈六金像事惠敬造丈六無量壽像事第二十九惠璩飲酒一鉢事曇光閇眠便見形像事通儒唯以讀誦法華首楞嚴勝淨名為業事僧喜願我此生弘菩薩道事第三十曇遷注十地經事僧辨千變萬化音聲妙異事曇憑我未來常有八辨為衆説法事法意能誦腅經事自文曆二年五月十五日午時至同十八日午時於笠置寺福城院南堂名僧傳一部三十卷之中至要説處隨引見令記録畢其本東大寺東南院經藏之本也是則為拾彌勒結緣之先蹤為記兜率往生之舊迹借請彼本所致此勤也仰願依此微功答其深志兜率天之秋暮必遂往生於內院之雲龍華樹之春朝早浩芳緣於三會之風矣有筆笠置寺住侶沙門宗性
